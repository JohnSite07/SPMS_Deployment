name: CI

on:
  pull_request:
    branches: [main]

# Default: no permissions. Individual jobs elevate only what they need.
permissions:
  contents: read

jobs:
  app-checks:
    name: App checks (lint + test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app
        run: npm run lint

      - name: Test
        working-directory: app
        run: npm test

  terraform-checks:
    name: Terraform checks (fmt/validate/plan)
    runs-on: ubuntu-latest
    # WIF auth is only granted for same-repo PRs (forks receive no OIDC token
    # for this repo's identity pool, and must not be trusted with it anyway).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Authenticate to GCP (WIF)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_PROJECT_ID }}-tfstate" \
            -backend-config="prefix=terraform/state"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      # Read-only intent: CI only ever runs `plan`, never `apply`.
      # Skipped for fork PRs, which have no WIF-issued credentials above.
      - name: Terraform plan
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: terraform plan -no-color
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_billing_account_id: ${{ vars.BILLING_ACCOUNT_ID }}
